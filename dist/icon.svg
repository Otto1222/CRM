<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#1E3A5F"/>

  <!-- Sun circle -->
  <circle cx="256" cy="148" r="68" fill="#FBBF24"/>

  <!-- Sun rays -->
  <rect x="248" y="44" width="16" height="44" rx="8" fill="#FBBF24"/>
  <rect x="248" y="208" width="16" height="44" rx="8" fill="#FBBF24"/>
  <rect x="144" y="140" width="44" height="16" rx="8" fill="#FBBF24"/>
  <rect x="324" y="140" width="44" height="16" rx="8" fill="#FBBF24"/>
  <rect x="162" y="70" width="16" height="44" rx="8" fill="#FBBF24" transform="rotate(45 170 92)"/>
  <rect x="334" y="70" width="16" height="44" rx="8" fill="#FBBF24" transform="rotate(-45 342 92)"/>
  <rect x="162" y="190" width="16" height="44" rx="8" fill="#FBBF24" transform="rotate(-45 170 212)"/>
  <rect x="334" y="190" width="16" height="44" rx="8" fill="#FBBF24" transform="rotate(45 342 212)"/>

  <!-- Solar panel (3x2 grid) -->
  <rect x="64" y="298" width="384" height="164" rx="14" fill="#2563EB"/>
  <!-- Horizontal divider -->
  <rect x="64" y="378" width="384" height="8" fill="#1E3A5F"/>
  <!-- Vertical dividers -->
  <rect x="192" y="298" width="8" height="164" fill="#1E3A5F"/>
  <rect x="312" y="298" width="8" height="164" fill="#1E3A5F"/>

  <!-- Panel shine highlights -->
  <rect x="72" y="306" width="112" height="64" rx="6" fill="#3B82F6" opacity="0.5"/>
  <rect x="200" y="306" width="112" height="64" rx="6" fill="#3B82F6" opacity="0.5"/>
  <rect x="320" y="306" width="112" height="64" rx="6" fill="#3B82F6" opacity="0.5"/>
</svg>
