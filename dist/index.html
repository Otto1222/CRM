    <!-- iOS PWA support -->

    <!-- Cache control (fejlesztői frissítés miatt) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <title>E.D.I. Solutions CRM</title>

  </head>
  <body>
    <div id="root"></div>

    <!-- Service Worker regisztráció -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('[SW] Regisztrálva:', reg.scope);
              // Friss SW azonnal aktiválódjon
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                if (newSW) {
                  newSW.addEventListener('statechange', () => {
                    if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('[SW] Frissítés elérhető – oldal újratöltéskor aktiválódik');
                    }
                  });
                }
              });
            })
            .catch(err => console.warn('[SW] Regisztráció sikertelen:', err));
        });
      }
    </script>
  </body>
</html>
