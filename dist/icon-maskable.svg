<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable (safe zone = center 80%) -->
  <rect width="512" height="512" fill="#1E3A5F"/>

  <!-- Sun circle -->
  <circle cx="256" cy="160" r="60" fill="#FBBF24"/>

  <!-- Sun rays (shorter, stays within safe zone) -->
  <rect x="249" y="68" width="14" height="36" rx="7" fill="#FBBF24"/>
  <rect x="249" y="216" width="14" height="36" rx="7" fill="#FBBF24"/>
  <rect x="156" y="153" width="36" height="14" rx="7" fill="#FBBF24"/>
  <rect x="320" y="153" width="36" height="14" rx="7" fill="#FBBF24"/>

  <!-- Solar panel (3x2 grid) -->
  <rect x="72" y="302" width="368" height="148" rx="12" fill="#2563EB"/>
  <rect x="72" y="374" width="368" height="8" fill="#1E3A5F"/>
  <rect x="196" y="302" width="8" height="148" fill="#1E3A5F"/>
  <rect x="308" y="302" width="8" height="148" fill="#1E3A5F"/>
  <rect x="80" y="310" width="108" height="56" rx="5" fill="#3B82F6" opacity="0.5"/>
  <rect x="204" y="310" width="108" height="56" rx="5" fill="#3B82F6" opacity="0.5"/>
  <rect x="316" y="310" width="108" height="56" rx="5" fill="#3B82F6" opacity="0.5"/>
</svg>
